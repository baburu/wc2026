<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 — Predictions League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/ui/style.css" />
</head>
<body>

  <header>
    <div class="header-eyebrow">Friends predictions league</div>
    <div class="ball">⚽</div>
    <div class="header-title">World Cup<br><span>2026</span></div>
    <div class="header-sub">Who called it best?</div>
  </header>

  <div class="grass"></div>

  <nav>
    <a href="/ui" class="pill active">Standings</a>
    <a href="#" class="pill" onclick="alert('Coming soon! Stats page in the works 📊'); return false;">Stats</a>
    <a href="#" class="pill" onclick="alert('Articles coming soon ✍️'); return false;">Articles</a>
  </nav>

  <div class="content-wrap">
    <main>
      <div class="section-label">
        <h2>General Classification</h2>
        <span class="badge">Live</span>
      </div>

      <div class="leaderboard-surface">
        <div class="tabs-row">
          <div class="tabs" role="tablist">
            <button class="tab active" data-board="lead" role="tab">Overall</button>
            <button class="tab" data-board="m1" role="tab">Matchday 1</button>
            <button class="tab" data-board="m2" role="tab">Matchday 2</button>
            <button class="tab" data-board="m3" role="tab">Matchday 3</button>
            <button class="tab" data-board="m4" role="tab">Matchday 4</button>
          </div>
          <button class="refresh-btn" id="refresh-btn">
            <span id="refresh-icon">↻</span> Refresh
          </button>
        </div>

        <div id="board-container">
          <div class="state-msg"><span class="icon">⏳</span>Loading scores…</div>
        </div>
      </div>
    </main>

    <aside id="card-panel">
      <div id="preload-progress-container" class="preload-progress-wrap hidden">
        <div class="progress-header">
          <span class="progress-title">⚽ Syncing Cards...</span>
          <span id="progress-percent" class="progress-num">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
      </div>

      <div id="hidden-card-vault" style="display: none !important;"></div>

      <div class="card-placeholder">
        <span class="card-placeholder-icon">👆</span>
        <p>Click a player<br>to see their card</p>
      </div>
    </aside>
  </div>

  <footer>
    World Cup 2026 Predictions League &mdash; good luck everyone ⚽
  </footer>

  <script src="/ui/script.js"></script>
</body>
</html>
